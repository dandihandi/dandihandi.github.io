<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Zapisy | Barbara Bogacka</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --accent: #d4af37; 
            --bg: #0f0f0f; 
            --card-bg: rgba(26, 26, 26, 0.8); 
            --text: #ffffff; 
            --text-dim: #a0a0a0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #2a2a2a 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .back-link { 
            display: inline-block; 
            margin-bottom: 30px; 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
        }
        .back-link:hover { color: var(--accent); }

        .card { 
            max-width: 600px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--text);
            font-weight: 600;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label {
            display: block;
            font-size: 0.65rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0,0,0,0.4);
        }

        .main-submit { 
            width: 100%; 
            padding: 20px; 
            background: var(--accent); 
            color: black; 
            font-weight: 600; 
            text-transform: uppercase; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: 0.3s;
            margin-top: 10px;
        }
        .main-submit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .conf-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conf-label { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .conf-value { color: white; font-weight: 500; text-align: right; }


        .print-document-header,
        .print-document-note { display: none; }

        @media print {
            @page { size: A4; margin: 22mm 20mm; }

            html, body {
                background: #fff !important;
                color: #000 !important;
                padding: 0 !important;
                margin: 0 !important;
                min-height: auto !important;
            }

            body * { visibility: hidden !important; }
            #confirmationView,
            #confirmationView * { visibility: visible !important; }

            #confirmationView {
                display: block !important;
                position: absolute !important;
                inset: 0 auto auto 0 !important;
                width: 100% !important;
                color: #000 !important;
                background: #fff !important;
                font-family: Arial, Helvetica, sans-serif !important;
            }

            .bg-glow, .back-link, .main-submit, #paymentInstructions, #confTitle {
                display: none !important;
            }

            .card {
                width: 100% !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
                background: #fff !important;
            }

            .print-document-header {
                display: block !important;
                margin: 0 0 26px 0 !important;
                padding: 0 0 18px 0 !important;
                border-bottom: 1.5px solid #000 !important;
                text-align: center !important;
            }

            .print-document-header h1 {
                margin: 0 0 8px 0 !important;
                font-size: 20pt !important;
                line-height: 1.2 !important;
                font-weight: 700 !important;
                letter-spacing: 1.2px !important;
                color: #000 !important;
            }

            .print-document-header p {
                margin: 0 !important;
                font-size: 9.5pt !important;
                color: #000 !important;
            }

            #confSummary {
                border-top: 1px solid #000 !important;
            }

            .conf-item {
                display: grid !important;
                grid-template-columns: 42% 58% !important;
                gap: 12px !important;
                align-items: start !important;
                margin: 0 !important;
                padding: 12px 10px !important;
                border: 0 !important;
                border-bottom: 1px solid #bdbdbd !important;
                border-radius: 0 !important;
                background: #fff !important;
                page-break-inside: avoid !important;
            }

            .conf-label {
                color: #000 !important;
                font-size: 9pt !important;
                line-height: 1.4 !important;
                font-weight: 700 !important;
                letter-spacing: 0 !important;
                text-transform: none !important;
            }

            .conf-value {
                color: #000 !important;
                font-size: 10pt !important;
                line-height: 1.4 !important;
                font-weight: 400 !important;
                text-align: left !important;
                overflow-wrap: anywhere !important;
            }

            .print-document-note {
                display: block !important;
                margin-top: 30px !important;
                padding-top: 16px !important;
                border-top: 1px solid #000 !important;
                font-size: 9.5pt !important;
                line-height: 1.55 !important;
                color: #000 !important;
                text-align: left !important;
            }

            .print-document-note strong {
                display: block !important;
                margin-bottom: 6px !important;
                color: #000 !important;
            }
        }


        .startup-message-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,.78);
            backdrop-filter: blur(8px);
        }
        .startup-message-overlay.visible { display: flex; }
        .startup-message-box {
            width: min(520px, 100%);
            padding: 30px;
            border-radius: 20px;
            background: #181818;
            border: 1px solid rgba(212,175,55,.45);
            box-shadow: 0 24px 70px rgba(0,0,0,.55);
            text-align: center;
        }
        .startup-message-box h3 {
            margin: 0 0 14px;
            color: var(--accent);
            font-size: 1.35rem;
        }
        .startup-message-box p {
            margin: 0;
            color: #fff;
            line-height: 1.65;
            white-space: pre-line;
            overflow-wrap: anywhere;
        }
        .startup-message-close {
            width: 100%;
            margin-top: 22px;
            padding: 15px;
            border: 0;
            border-radius: 12px;
            background: var(--accent);
            color: #111;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

    </style>
</head>
<body>


    <div class="startup-message-overlay" id="startupMessageOverlay" role="dialog" aria-modal="true" aria-labelledby="startupMessageTitle">
        <div class="startup-message-box">
            <h3 id="startupMessageTitle">Ważna informacja</h3>
            <p id="startupMessageText"></p>
            <button class="startup-message-close" type="button" onclick="closeStartupMessage()">Rozumiem</button>
        </div>
    </div>

    <div class="bg-glow">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <a class="back-link" href="index.html">← Wróć do strony głównej</a>
    
    <div class="card" id="formCard">
        <div id="formView">
            <div id="privatesSection">
                <h2>ZAPISZ SIĘ NA LEKCJĘ PRYWATNĄ</h2>
                <form id="privateForm">
                    <div class="form-group">
                        <label class="form-label">Imię i Nazwisko</label>
                        <input id="plFullName" placeholder="np. Anna Kowalska" required type="text"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Numer telefonu</label>
                        <input id="plPhone" placeholder="xxx-xxx-xxx" required type="tel" maxlength="11"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Wybierz rodzaj tańca</label>
                        <select id="plDanceType" required onchange="toggleFirstDanceFields()">
                            <option value="Bachata (150 zł)">Bachata (150 zł)</option>
                            <option value="Salsa (150 zł)">Salsa (150 zł)</option>
                            <option value="High Heels (150 zł)">High Heels (150 zł)</option>
                            <option value="Taniec Towarzyski (150 zł)">Taniec Towarzyski (150 zł)</option>
                            <option value="Pierwszy Taniec (150 zł)">Pierwszy Taniec (150 zł)</option>
                        </select>
                    </div>
                    <div class="form-group" id="levelGroup">
                        <label class="form-label">Poziom zaawansowania</label>
                        <select id="plLevel" required>
                            <option value="od podstaw">Od podstaw</option>
                            <option value="średnio zaawansowany">Średnio zaawansowany</option>
                            <option value="zaawansowany">Zaawansowany</option>
                        </select>
                    </div>
                    <div id="firstDanceSongGroup" class="form-group" style="display: none;">
                        <label class="form-label">Piosenka do pierwszego tańca</label>
                        <input id="plSong" placeholder="Wpisz tytuł piosenki albo wklej link" type="text"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sugerowane terminy</label>
                        <input id="plDates" placeholder="np. Przyszły wtorek lub 15.03" required type="text"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sugerowane godziny</label>
                        <input id="plHours" placeholder="np. 14:30–15:30 lub po 18:00" required type="text"/>
                    </div>
                    <button class="main-submit" type="submit">ZAPISZ SIĘ</button>
                </form>
            </div>
        </div>

        <div id="confirmationView" style="display: none;">
            <div class="print-document-header">
                <h1>POTWIERDZENIE ZAPISU</h1>
                <p>Barbara Bogacka — zajęcia taneczne</p>
            </div>
            <h2 id="confTitle">PODSUMOWANIE ZAPISU</h2>
            <div id="confSummary"></div>
            
            <div id="paymentInstructions" style="margin-top: 25px; text-align: center;"></div>

            <div class="print-document-note">
                <strong>Informacja</strong>
                Zgłoszenie zostało przyjęte. Termin lekcji zostanie potwierdzony indywidualnie wiadomością SMS.
            </div>

            <button class="main-submit" onclick="window.print()" style="margin-top: 20px; background: white; color: black;">Zapisz jako PDF / Drukuj</button>
            <button class="main-submit" onclick="location.href='index.html'" style="background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1);">Wróć na stronę główną</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDssqjSqhRHJ2_BhzqgspuX_-q2KP2ydqs",
            authDomain: "bogacka-heels.firebaseapp.com",
            databaseURL: "https://bogacka-heels-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bogacka-heels",
            storageBucket: "bogacka-heels.firebasestorage.app",
            messagingSenderId: "825219158791",
            appId: "1:825219158791:web:38acf635db61854739eba2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

const WORKER_URL = "https://discord-webhook.idanielowskyy.workers.dev";

async function sendDiscordNotification(data) {
  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!response.ok) {
      throw new Error(`Worker returned ${response.status}`);
    }
  } catch (e) {
    console.error("Discord notification failed", e);
  }
}



        function closeStartupMessage() {
            document.getElementById('startupMessageOverlay').classList.remove('visible');
        }

        function loadStartupMessage() {
            db.ref('privateLessonMessage').once('value').then(snapshot => {
                const data = snapshot.val() || {};
                const message = String(data.message || '').trim();
                if (data.active && message) {
                    document.getElementById('startupMessageTitle').textContent = String(data.title || 'Ważna informacja').trim() || 'Ważna informacja';
                    document.getElementById('startupMessageText').textContent = message;
                    document.getElementById('startupMessageOverlay').classList.add('visible');
                }
            }).catch(error => console.error('Nie udało się pobrać komunikatu:', error));
        }

        document.addEventListener('DOMContentLoaded', loadStartupMessage);


        function setupPhoneFormatting(id) {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', function (e) {
                    let value = e.target.value.replace(/\D/g, ''); 
                    if (value.length > 9) value = value.slice(0, 9);
                    let formattedValue = '';
                    if (value.length > 0) {
                        formattedValue = value.substring(0, 3);
                        if (value.length > 3) formattedValue += '-' + value.substring(3, 6);
                        if (value.length > 6) formattedValue += '-' + value.substring(6, 9);
                    }
                    e.target.value = formattedValue;
                });
            }
        }
        setupPhoneFormatting('plPhone');

        function toggleFirstDanceFields() {
            const isFirstDance = document.getElementById('plDanceType').value.startsWith('Pierwszy Taniec');
            document.getElementById('levelGroup').style.display = isFirstDance ? 'none' : 'block';
            document.getElementById('plLevel').required = !isFirstDance;
            document.getElementById('firstDanceSongGroup').style.display = isFirstDance ? 'block' : 'none';
        }

        toggleFirstDanceFields();

        function showConfirmation(data) {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('confirmationView').style.display = 'block';
            
            const summary = document.getElementById('confSummary');
            const instructions = document.getElementById('paymentInstructions');
            summary.innerHTML = '';

            summary.innerHTML = `
                <div class="conf-item"><span class="conf-label">Osoba</span><span class="conf-value">${data.fullName}</span></div>
                <div class="conf-item"><span class="conf-label">Telefon</span><span class="conf-value">${data.phone}</span></div>
                <div class="conf-item"><span class="conf-label">Rodzaj tańca</span><span class="conf-value">${data.danceType}</span></div>
                ${data.song ? `<div class="conf-item"><span class="conf-label">Piosenka</span><span class="conf-value">${data.song}</span></div>` : ''}
                <div class="conf-item"><span class="conf-label">Proponowany termin</span><span class="conf-value">${data.suggestedDates}</span></div>
                <div class="conf-item"><span class="conf-label">Godzina</span><span class="conf-value">${data.suggestedHours}</span></div>
            `;
            instructions.innerHTML = `
                <div style="background: rgba(212,175,55,0.1); padding: 20px; border-radius: 15px; border: 1px solid var(--accent);">
                    <p style="margin: 0; font-size: 0.95rem; color: #fff;">Dziękuję za zapisanie! Lekcja zostanie potwierdzona wiadomością SMS.</p>
                </div>
            `;
        }

        document.getElementById('privateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const danceType = document.getElementById('plDanceType').value;
            const isFirstDance = danceType.startsWith('Pierwszy Taniec');
            const song = document.getElementById('plSong').value.trim();

            if (isFirstDance && !song) {
                alert('Wpisz tytuł piosenki albo wklej link do utworu.');
                return;
            }

            const inquiry = {
                fullName: document.getElementById('plFullName').value,
                phone: document.getElementById('plPhone').value,
                danceType: danceType,
                level: isFirstDance ? '' : document.getElementById('plLevel').value,
                song: isFirstDance ? song : '',
                suggestedDates: document.getElementById('plDates').value,
                suggestedHours: document.getElementById('plHours').value.trim(),
                dateAdded: new Date().toLocaleString('pl-PL'),
                type: 'Private Lesson Inquiry'
            };

            db.ref('privateInquiries').push(inquiry).then(() => {
                sendDiscordNotification({
                    type: "private",
                    fullName: inquiry.fullName,
                    phone: inquiry.phone,
                    danceType: inquiry.danceType,
                    suggestedDates: inquiry.suggestedDates,
                    suggestedHours: inquiry.suggestedHours
                });
                showConfirmation(inquiry);
            });
        });
    </script>
</body>
</html>
