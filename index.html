<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Główna | Barbara Bogacka</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --accent: #d4af37; 
            --bg: #0f0f0f; 
            --card-bg: #1a1a1a;
            --text: #ffffff; 
            --text-dim: #a0a0a0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text); 
            margin: 0; 
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #2a2a2a 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .hero { 
            height: 40vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 0 20px;
            position: relative;
        }

        h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem; 
            font-weight: 700;
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--accent);
            margin: 0; 
        }

        .tagline { 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            color: var(--text); 
            margin-top: 10px; 
            margin-bottom: 30px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* --- NOWY PASEK NAWIGACJI --- */
        .nav-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            padding: 5px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; 
            gap: 30px;
        }

        .btn-nav { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--text-dim); 
            text-decoration: none; 
            padding: 12px 0;
            position: relative;
            transition: 0.3s;
        }

        .btn-nav::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: 0.3s;
        }

        .btn-nav.active, .btn-nav:hover { color: #fff; }
        .btn-nav.active::after, .btn-nav:hover::after { width: 100%; }
        /* --------------------------- */

        .container { 
            max-width: 700px; 
            margin: 0 auto 60px; 
            padding: 0 20px; 
            position: relative;
        }

        .card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .countdown-label {
            display: block;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .countdown { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .timer-item { 
            background: rgba(255,255,255,0.03);
            padding: 15px 5px;
            border-radius: 12px;
            text-align: center; 
        }
        .timer-item span { 
            display: block; 
            font-size: 1.8rem; 
            font-weight: 600; 
            color: #ffffff; 
        }
        .timer-item label { 
            font-size: 0.6rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .event-info { text-align: center; }
        .event-title { 
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem; 
            font-weight: 700;
            margin-bottom: 15px; 
        }
        .description { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 35px; font-weight: 300; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: left;
        }

        .info-box .label {
            display: block;
            font-size: 0.65rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .info-box .value { font-size: 1rem; font-weight: 400; }

        .price-old {
            text-decoration: line-through;
            opacity: 0.5;
            font-size: 0.85rem;
            margin-right: 8px;
        }
        .price-promo {
            color: #ffffff;
            font-weight: 700;
        }

        .btn-map {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-decoration: underline;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .btn-map:hover { color: var(--accent); }

        .btn-main {
            display: block;
            background: var(--accent);
            color: #000;
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        @media (max-width: 500px) {
            .info-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
            .nav-container { gap: 15px; padding: 5px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="hero">
        <h1>Barbara Bogacka</h1>
        <div class="tagline">Najlepsza tancerka w Polsce</div>
        
        <div class="nav-container">
            <a href="index.html" class="btn-nav active">Warsztaty</a>
            <a href="register.html" class="btn-nav">Lekcje Prywatne</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <span class="countdown-label">Do warsztatów pozostało</span>
            
            <div class="countdown">
                <div class="timer-item"><span id="days">00</span><label>Dni</label></div>
                <div class="timer-item"><span id="hours">00</span><label>Godz</label></div>
                <div class="timer-item"><span id="mins">00</span><label>Min</label></div>
                <div class="timer-item"><span id="secs">00</span><label>Sek</label></div>
            </div>

            <div class="event-info">
                <div class="event-title" id="mainTitle">...</div>
                <div class="description" id="mainDescription">Ładowanie opisu...</div>

                <div class="info-grid">
                    <div class="info-box">
                        <span class="label">Kiedy</span>
                        <span class="value" id="mainDate">Ładowanie...</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Cena</span>
                        <span class="value" id="priceContainer">
                            <span id="mainPrice">...</span> PLN
                        </span>
                    </div>
                    <div class="info-box" style="grid-column: span 2;">
                        <span class="label">Miejsce</span>
                        <span class="value" id="mainLoc">...</span>
                    </div>
                </div>
                
                <a href="#" id="mainMap" target="_blank" class="btn-map">Otwórz lokalizację w Mapach Google</a>

                <a href="register.html" class="btn-main">Zarezerwuj swoje miejsce</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDssqjSqhRHJ2_BhzqgspuX_-q2KP2ydqs",
            authDomain: "bogacka-heels.firebaseapp.com",
            databaseURL: "https://bogacka-heels-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bogacka-heels",
            storageBucket: "bogacka-heels.firebasestorage.app",
            messagingSenderId: "825219158791",
            appId: "1:825219158791:web:38acf635db61854739eba2"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let targetTime = 0;

        database.ref('settings').on('value', snapshot => {
            const s = snapshot.val();
            if(s) {
                document.getElementById('mainTitle').innerText = s.title || "";
                document.getElementById('mainLoc').innerText = s.location || "";
                document.getElementById('mainMap').href = s.mapUrl || "#";
                document.getElementById('mainDescription').innerText = s.description || "";
                
                const priceContainer = document.getElementById('priceContainer');
                if (s.promoActive && s.promoPrice) {
                    priceContainer.innerHTML = `
                        <span class="price-old">${s.price} PLN</span>
                        <span class="price-promo">${s.promoPrice} PLN</span>
                    `;
                } else {
                    priceContainer.innerHTML = `<span id="mainPrice">${s.price || "..."}</span> PLN`;
                }
                
                if(s.targetDate) {
                    targetTime = new Date(s.targetDate).getTime();
                    const d = new Date(s.targetDate);
                    const formatted = d.toLocaleDateString('pl-PL', {
                        day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    document.getElementById('mainDate').innerText = formatted;
                }
            }
        });

        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetTime - now;
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24)).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60)).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((diff % (1000*60*60)) / (1000*60)).toString().padStart(2, '0');
                document.getElementById('secs').innerText = Math.floor((diff % (1000*60)) / 1000).toString().padStart(2, '0');
            } else {
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('mins').innerText = "00";
                document.getElementById('secs').innerText = "00";
            }
        }, 1000);
    </script>
</body>
</html>
