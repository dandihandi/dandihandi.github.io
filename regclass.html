<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Zapisy | Barbara Bogacka</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --accent: #d4af37; 
            --bg: #0f0f0f; 
            --card-bg: rgba(26, 26, 26, 0.8); 
            --text: #ffffff; 
            --text-dim: #a0a0a0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #2a2a2a 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .back-link { 
            display: inline-block; 
            margin-bottom: 30px; 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
        }
        .back-link:hover { color: var(--accent); }

        .card { 
            max-width: 600px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--text);
            font-weight: 600;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label {
            display: block;
            font-size: 0.65rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0,0,0,0.4);
        }

        .main-submit { 
            width: 100%; 
            padding: 20px; 
            background: var(--accent); 
            color: black; 
            font-weight: 600; 
            text-transform: uppercase; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: 0.3s;
            margin-top: 10px;
        }
        .main-submit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .conf-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conf-label { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .conf-value { color: white; font-weight: 500; text-align: right; }

        .revolut-btn {
            display: inline-block;
            margin-top: 10px;
            background: #ffffff;
            color: #000000;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }


        .print-document-header,
        .print-document-note { display: none; }

        @media print {
            @page { size: A4; margin: 22mm 20mm; }

            html, body {
                background: #fff !important;
                color: #000 !important;
                padding: 0 !important;
                margin: 0 !important;
                min-height: auto !important;
            }

            body * { visibility: hidden !important; }
            #confirmationView,
            #confirmationView * { visibility: visible !important; }

            #confirmationView {
                display: block !important;
                position: absolute !important;
                inset: 0 auto auto 0 !important;
                width: 100% !important;
                color: #000 !important;
                background: #fff !important;
                font-family: Arial, Helvetica, sans-serif !important;
            }

            .bg-glow, .back-link, .main-submit, #paymentInstructions, #confTitle {
                display: none !important;
            }

            .card {
                width: 100% !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
                background: #fff !important;
            }

            .print-document-header {
                display: block !important;
                margin: 0 0 26px 0 !important;
                padding: 0 0 18px 0 !important;
                border-bottom: 1.5px solid #000 !important;
                text-align: center !important;
            }

            .print-document-header h1 {
                margin: 0 0 8px 0 !important;
                font-size: 20pt !important;
                line-height: 1.2 !important;
                font-weight: 700 !important;
                letter-spacing: 1.2px !important;
                color: #000 !important;
            }

            .print-document-header p {
                margin: 0 !important;
                font-size: 9.5pt !important;
                color: #000 !important;
            }

            #confSummary {
                border-top: 1px solid #000 !important;
            }

            .conf-item {
                display: grid !important;
                grid-template-columns: 42% 58% !important;
                gap: 12px !important;
                align-items: start !important;
                margin: 0 !important;
                padding: 12px 10px !important;
                border: 0 !important;
                border-bottom: 1px solid #bdbdbd !important;
                border-radius: 0 !important;
                background: #fff !important;
                page-break-inside: avoid !important;
            }

            .conf-label {
                color: #000 !important;
                font-size: 9pt !important;
                line-height: 1.4 !important;
                font-weight: 700 !important;
                letter-spacing: 0 !important;
                text-transform: none !important;
            }

            .conf-value {
                color: #000 !important;
                font-size: 10pt !important;
                line-height: 1.4 !important;
                font-weight: 400 !important;
                text-align: left !important;
                overflow-wrap: anywhere !important;
            }

            .print-document-note {
                display: block !important;
                margin-top: 30px !important;
                padding-top: 16px !important;
                border-top: 1px solid #000 !important;
                font-size: 9.5pt !important;
                line-height: 1.55 !important;
                color: #000 !important;
                text-align: left !important;
            }

            .print-document-note strong {
                display: block !important;
                margin-bottom: 6px !important;
                color: #000 !important;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <a class="back-link" href="index.html">← Wróć do strony głównej</a>
    
    <div class="card" id="formCard">
        <div id="formView">
            <div id="workshopsSection">
                <h2>ZAPISZ SIĘ NA WARSZTATY</h2>
                <form id="regForm">
                    <div class="form-group">
                        <label class="form-label">Imię i Nazwisko</label>
                        <input id="fullName" placeholder="np. Anna Kowalska" required type="text"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Adres E-mail</label>
                        <input id="email" placeholder="email@przykład.pl" required type="email"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Wybierz wydarzenie</label>
                        <select id="event" required>
                            <option value="" disabled selected>Ładowanie list...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Skąd o nas wiesz?</label>
                        <input id="source" placeholder="np. Instagram, Facebook" required type="text"/>
                    </div>
                    <button class="main-submit" type="submit">ZAPISZ SIĘ</button>
                </form>
            </div>
        </div>

        <div id="confirmationView" style="display: none;">
            <div class="print-document-header">
                <h1>POTWIERDZENIE ZAPISU</h1>
                <p>Barbara Bogacka — zajęcia taneczne</p>
            </div>
            <h2 id="confTitle">PODSUMOWANIE ZAPISU</h2>
            <div id="confSummary"></div>
            
            <div id="paymentInstructions" style="margin-top: 25px; text-align: center;"></div>

            <div class="print-document-note">
                <strong>Informacja</strong>
                Zgłoszenie zostało przyjęte. Rezerwacja miejsca zostanie potwierdzona po zaksięgowaniu wymaganej płatności.
            </div>

            <button class="main-submit" onclick="window.print()" style="margin-top: 20px; background: white; color: black;">Zapisz jako PDF / Drukuj</button>
            <button class="main-submit" onclick="location.href='index.html'" style="background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1);">Wróć na stronę główną</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDssqjSqhRHJ2_BhzqgspuX_-q2KP2ydqs",
            authDomain: "bogacka-heels.firebaseapp.com",
            databaseURL: "https://bogacka-heels-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bogacka-heels",
            storageBucket: "bogacka-heels.firebasestorage.app",
            messagingSenderId: "825219158791",
            appId: "1:825219158791:web:38acf635db61854739eba2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

const WORKER_URL = "https://discord-webhook.idanielowskyy.workers.dev";

async function sendDiscordNotification(data) {
  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!response.ok) {
      throw new Error(`Worker returned ${response.status}`);
    }
  } catch (e) {
    console.error("Discord notification failed", e);
  }
}



        let globalPrice = "...";

        db.ref('settings').on('value', snapshot => {
            const s = snapshot.val();
            if(s) {
                const select = document.getElementById('event');
                select.innerHTML = '<option value="" disabled selected>Wybierz event</option>';
                (s.eventList || "").split(',').forEach(e => {
                    if(e.trim()) select.innerHTML += `<option value="${e.trim()}">${e.trim()}</option>`;
                });
                globalPrice = s.price || "...";
            }
        });

        function showConfirmation(data) {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('confirmationView').style.display = 'block';
            
            const summary = document.getElementById('confSummary');
            const instructions = document.getElementById('paymentInstructions');
            summary.innerHTML = '';

            summary.innerHTML = `
                <div class="conf-item"><span class="conf-label">Osoba</span><span class="conf-value">${data.fullName}</span></div>
                <div class="conf-item"><span class="conf-label">Wydarzenie</span><span class="conf-value">${data.event}</span></div>
                <div class="conf-item"><span class="conf-label">E-mail</span><span class="conf-value">${data.email}</span></div>
                <div class="conf-item"><span class="conf-label">Data zapisu</span><span class="conf-value">${data.date}</span></div>
            `;
            instructions.innerHTML = `
                <p style="font-size: 0.9rem; color: var(--text-dim);">Aby sfinalizować zapis, prosimy o płatność przez <strong>Revolut</strong>:</p>
                <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid var(--accent);">
                    <p style="margin: 0 0 10px 0;">Kwota: <strong style="color: var(--accent); font-size: 1.2rem;">${globalPrice}</strong> PLN</p>
                    <p style="margin: 0; font-size: 0.85rem;">Tytuł: <strong style="color: var(--text);">${data.email}</strong></p>
                    <a href="https://revolut.me/dandihandi" target="_blank" class="revolut-btn">Zapłać przez Revolut</a>
                </div>
            `;
        }

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newReg = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                event: document.getElementById('event').value,
                source: document.getElementById('source').value,
                date: new Date().toLocaleString('pl-PL'),
                type: 'Workshop'
            };
            db.ref('registrations').push(newReg).then(() => {
                sendDiscordNotification({
                    type: "workshop",
                    fullName: newReg.fullName,
                    email: newReg.email,
                    event: newReg.event,
                    date: newReg.date
                });
                showConfirmation(newReg);
            });
        });
    </script>
</body>
</html>
